server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Redis for Rate Limiting
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    gateway:
      routes:
        # Product Service Routes
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/products/**,/api/categories/**

        # Search Service Routes
        - id: search-service
          uri: http://search-service:8082
          predicates:
            - Path=/api/search/**

        # Cart Service Routes
        - id: cart-service
          uri: http://cart-service:8083
          predicates:
            - Path=/api/cart/**,/api/carts/**

        # Inventory Service Routes
        - id: inventory-service
          uri: http://inventory-service:8084
          predicates:
            - Path=/api/inventory/**,/api/inventories/**

        # Order Service Routes
        - id: order-service
          uri: http://order-service:8085
          predicates:
            - Path=/api/orders/**,/api/order/**

        # Recommendation Service Routes
        - id: recommendation-service
          uri: http://recommendation-service:8086
          predicates:
            - Path=/api/recommendations/**

      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000,http://localhost:4200"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true

# Logging Configuration
logging:
  level:
    dev.makeev.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    health:
      show-details: always
  health:
    discovery:
      enabled: false
    reactive-discovery:
      enabled: false

# SpringDoc OpenAPI (Swagger) Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: true
