server:
  port: 8092

spring:
  application:
    name: product-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5435/product_db
    username: ecommerce
    password: ecommerce123
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5673
    username: ecommerce
    password: ecommerce123

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ecommerce.product: DEBUG
    org.springframework.r2dbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"