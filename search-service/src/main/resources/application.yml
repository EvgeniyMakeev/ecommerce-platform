server:
  port: 8082

spring:
  application:
    name: search-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    dev.makeev.search: DEBUG
    org.springframework.data.elasticsearch: DEBUG
    reactor.netty: INFO
