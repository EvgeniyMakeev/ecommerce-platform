server:
  port: 8082

spring:
  application:
    name: search-service
  
  # Elasticsearch Configuration
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    
  # RabbitMQ Configuration for Spring Cloud Stream
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ecommerce}
    password: ${SPRING_RABBITMQ_PASSWORD:ecommerce123}
    virtual-host: /
    
  # Spring Cloud Stream Configuration
  cloud:
    stream:
      bindings:
        productEvents-in-0:
          destination: product.events
          group: search-service
          content-type: application/json
        productEvents-out-0:
          destination: search.events
          content-type: application/json
      rabbit:
        bindings:
          productEvents-in-0:
            consumer:
              auto-bind-dlq: true
              acknowledge-mode: manual
          productEvents-out-0:
            producer:
              confirm-mode: correlated

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false

logging:
  level:
    dev.makeev.search: DEBUG
    org.springframework.data.elasticsearch: DEBUG
    reactor.netty: INFO
