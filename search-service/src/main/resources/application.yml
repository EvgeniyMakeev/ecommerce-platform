server:
  port: 8082

spring:
  application:
    name: search-service
  
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
    
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ecommerce}
    password: ${SPRING_RABBITMQ_PASSWORD:ecommerce123}
    virtual-host: /
    
  cloud:
    stream:
      bindings:
        productEvents-in-0:
          destination: product.events
          group: search-service
          content-type: application/json
      rabbit:
        bindings:
          productEvents-in-0:
            consumer:
              auto-bind-dlq: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    elasticsearch:
      enabled: false

logging:
  level:
    dev.makeev.search: DEBUG
    org.springframework.data.elasticsearch: DEBUG
    reactor.netty: INFO
