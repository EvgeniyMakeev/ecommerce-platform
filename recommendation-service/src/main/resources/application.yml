server:
  port: 8086

spring:
  application:
    name: recommendation-service
  
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ecommerce_recommendations
    username: postgres
    password: postgres
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Logging Configuration
logging:
  level:
    dev.makeev.recommendation: DEBUG
    org.springframework.r2dbc: INFO
    io.r2dbc.postgresql: INFO

# Management endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
