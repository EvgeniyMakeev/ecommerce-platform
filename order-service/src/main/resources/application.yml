server:
  port: 8085

spring:
  application:
    name: order-service
  
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/order_db
    username: ecommerce
    password: ecommerce123
    properties:
      ssl: false
      maximum-pool-size: 10
      initial-size: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    stream:
      bindings:
        orderEvents-out-0:
          destination: orderEvents
          content-type: application/json
        orderEvents-in-0:
          destination: orderEvents
          group: order-service
          content-type: application/json
      rabbit:
        bindings:
          orderEvents-in-0:
            consumer:
              auto-bind-dlq: true
              acknowledge-mode: manual
              prefetch: 1
              default-requeue-rejected: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    dev.makeev.order: DEBUG
    org.springframework.data.r2dbc: DEBUG
    org.springframework.cloud.stream: DEBUG
    reactor.netty: INFO
